version: "3.8"

services:
  agentbox:
    build: .
    container_name: agentbox
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - agentbox-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data

volumes:
  agentbox-data:
